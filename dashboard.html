<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEC Mock Election - Live Results</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "Lato", "Segoe UI", Arial, sans-serif;
    background: #2d2151;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .header { text-align:center; margin-bottom:1.5rem; }
  .header img { max-width:520px; width:90%; margin-bottom:1rem; }
  .header h2 { font-size:1.2rem; font-weight:700; color:#c8b8e8; letter-spacing:3px; text-transform:uppercase; }
  .total-badge {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 0.5rem 2rem;
    font-size: 1.15rem;
    color: #fff;
    font-weight: 700;
    margin-bottom: 2.5rem;
    letter-spacing: 1px;
  }
  .candidates {
    display:flex; gap:1.8rem; width:100%; max-width:1000px;
    align-items:flex-end; justify-content:center; flex-wrap:wrap;
  }
  .candidate-card {
    flex:1; min-width:230px; max-width:290px;
    background: rgba(255,255,255,0.08);
    border-radius:24px;
    border: 2px solid rgba(255,255,255,0.15);
    padding:1.8rem 1.5rem 1.5rem;
    text-align:center;
    transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
  }
  .candidate-card.leader { background:rgba(255,255,255,0.14); transform:scale(1.05); }
  .candidate-card .emoji { font-size:3.5rem; margin-bottom:0.5rem; display:block; }
  .candidate-card h2 { font-size:1.5rem; font-weight:900; margin-bottom:0.15rem; color:#fff; }
  .party { font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:0.8rem; }
  .vote-count { font-size:3.5rem; font-weight:900; line-height:1; margin:0.4rem 0; }
  .vote-label { font-size:0.78rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:1rem; color:rgba(255,255,255,0.45); }
  .bar-track { background:rgba(255,255,255,0.12); border-radius:10px; height:13px; overflow:hidden; margin-bottom:0.5rem; }
  .bar-fill { height:100%; border-radius:10px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .pct { font-size:0.9rem; color:rgba(255,255,255,0.45); font-weight:700; }
  .pizza .vote-count { color:#7aadde; }
  .pizza .bar-fill { background:#7aadde; }
  .pizza .party { color:#7aadde; opacity:0.85; }
  .pizza.leader { border-color:#7aadde; }
  .burger .vote-count { color:#f09d99; }
  .burger .bar-fill { background:#f09d99; }
  .burger .party { color:#f09d99; opacity:0.85; }
  .burger.leader { border-color:#f09d99; }
  .writein .vote-count { color:#c9a8e8; }
  .writein .bar-fill { background:#c9a8e8; }
  .writein .party { color:#c9a8e8; opacity:0.85; }
  .writein.leader { border-color:#c9a8e8; }
  .winner-banner {
    display:none; margin-top:2rem;
    background:rgba(255,255,255,0.1);
    border:2px solid rgba(255,255,255,0.35);
    border-radius:16px; padding:0.9rem 2.5rem;
    font-size:1.3rem; font-weight:700; color:#fff; text-align:center;
    animation:pulse 1.8s ease-in-out infinite; letter-spacing:0.5px;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .live-dot { display:inline-block; width:10px; height:10px; background:#6bc47a; border-radius:50%; margin-right:8px; animation:blink 1.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
  .crown { display:none; font-size:1.5rem; margin-bottom:0.3rem; }
  .candidate-card.leader .crown { display:block; }
  .footer { margin-top:2rem; font-size:0.8rem; color:rgba(255,255,255,0.25); letter-spacing:0.5px; }
</style>
</head>

<script>
  const firebaseConfig = {

  apiKey: "AIzaSyB9GLAO-fR6sPn8NiH5pX7xz4twwhBjHng",

  authDomain: "fec-kid-votes.firebaseapp.com",

  databaseURL: "https://fec-kid-votes-default-rtdb.firebaseio.com",

  projectId: "fec-kid-votes",

  storageBucket: "fec-kid-votes.firebasestorage.app",

  messagingSenderId: "22309061871",

  appId: "1:22309061871:web:db63fbebef48832289871a"

};
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const votesRef = db.ref("votes");
  let currentLeader = null;

  function playFanfare() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523,659,784,1047].forEach((freq,i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i*0.13);
      gain.gain.setValueAtTime(0, ctx.currentTime + i*0.13);
      gain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + i*0.13 + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.13 + 0.18);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i*0.13); osc.stop(ctx.currentTime + i*0.13 + 0.2);
    });
  }

  function update(data) {
    const pizza = data.pizza||0, burger = data.burger||0, writein = data.writein||0;
    const total = pizza + burger + writein;
    document.getElementById("total-votes").textContent = total;
    document.getElementById("count-pizza").textContent = pizza;
    document.getElementById("count-burger").textContent = burger;
    document.getElementById("count-writein").textContent = writein;
    const pct = n => total > 0 ? Math.round((n/total)*100) : 0;
    ["pizza","burger","writein"].forEach(c => {
      document.getElementById("bar-"+c).style.width = pct(data[c]||0)+"%";
      document.getElementById("pct-"+c).textContent = pct(data[c]||0)+"%";
      document.getElementById("card-"+c).classList.remove("leader");
    });
    if (total > 0) {
      const max = Math.max(pizza,burger,writein);
      const leaders = [];
      if (pizza===max) leaders.push("pizza");
      if (burger===max) leaders.push("burger");
      if (writein===max) leaders.push("writein");
      leaders.forEach(c => document.getElementById("card-"+c).classList.add("leader"));
      const banner = document.getElementById("winner-banner");
      const names = { pizza:"Pizza", burger:"Hamburger", writein:"Write-In" };
      if (leaders.length===1) {
        banner.style.display = "block";
        banner.textContent = "Trophy: " + names[leaders[0]] + " is in the lead!";
        if (currentLeader !== leaders[0]) {
          if (currentLeader !== null) playFanfare();
          currentLeader = leaders[0];
        }
      } else {
        banner.style.display = "block";
        banner.textContent = "It's a tie!";
        currentLeader = "tie";
      }
    }
  }

  votesRef.on("value", snap => update(snap.val() || {pizza:0,burger:0,writein:0}));
</script>
